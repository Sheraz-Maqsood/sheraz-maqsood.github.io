<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>404 — Signal Lost // Sheraz ARC OS</title>
  <meta name="robots" content="noindex">
  <meta name="theme-color" content="#02040a">
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 40 40'%3E%3Cpolygon points='20,2 36,11 36,29 20,38 4,29 4,11' fill='%2302040a' stroke='%2338e0ff' stroke-width='2'/%3E%3Ctext x='20' y='26' text-anchor='middle' fill='%2338e0ff' font-family='monospace' font-size='17' font-weight='700'%3ES%3C/text%3E%3C/svg%3E">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="preload" as="style" href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@500;700&family=JetBrains+Mono:wght@400;700&display=swap" onload="this.onload=null;this.rel='stylesheet'">
  <noscript><link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@500;700&family=JetBrains+Mono:wght@400;700&display=swap"></noscript>
  <style>
    :root { --cy:#38e0ff; --gold:#ffc46b; --fg:#dff3ff; --muted:#8fb4c9; --line:rgba(56,224,255,0.18); }
    * { margin:0; padding:0; box-sizing:border-box; }
    body { min-height:100vh; display:flex; align-items:center; justify-content:center; background:#02040a; color:var(--fg); font-family:"Rajdhani",system-ui,sans-serif; overflow:hidden; position:relative; }
    body::before { content:""; position:fixed; inset:0; background:repeating-linear-gradient(0deg, rgba(56,224,255,0.04) 0 1px, transparent 1px 3px); pointer-events:none; }
    body::after { content:""; position:fixed; inset:0; background:radial-gradient(ellipse 70% 60% at 50% 40%, transparent 30%, rgba(2,4,10,0.9) 100%); pointer-events:none; }
    .box { text-align:center; padding:40px 24px; position:relative; z-index:1; max-width:560px; }
    .hex { width:90px; height:90px; margin:0 auto 28px; animation:spin 14s linear infinite; }
    @keyframes spin { to { transform:rotate(360deg); } }
    .code { font-family:"JetBrains Mono",monospace; font-size:clamp(4rem,16vw,7rem); font-weight:700; color:var(--cy); text-shadow:0 0 30px rgba(56,224,255,0.5); letter-spacing:0.06em; }
    .glitch { position:relative; display:inline-block; }
    .glitch::before, .glitch::after { content:"404"; position:absolute; inset:0; opacity:0; }
    .glitch::before { color:#ff5a6e; animation:g1 3.2s steps(2) infinite; }
    .glitch::after { color:var(--gold); animation:g2 4.1s steps(2) infinite; }
    @keyframes g1 { 0%,92%,100%{opacity:0;transform:none;} 93%{opacity:.7;transform:translate(-4px,-2px);} 96%{transform:translate(3px,1px);} }
    @keyframes g2 { 0%,90%,100%{opacity:0;transform:none;} 91%{opacity:.6;transform:translate(4px,2px);} 95%{transform:translate(-2px,-1px);} }
    h1 { font-size:clamp(1.2rem,4vw,1.7rem); text-transform:uppercase; letter-spacing:0.25em; margin:10px 0 14px; }
    p { color:var(--muted); font-family:"JetBrains Mono",monospace; font-size:13px; line-height:1.7; margin-bottom:30px; }
    p b { color:var(--cy); font-weight:400; }
    .btn { display:inline-flex; align-items:center; gap:9px; font-family:"JetBrains Mono",monospace; font-size:12px; letter-spacing:0.14em; text-transform:uppercase; padding:13px 26px; background:var(--cy); color:#02121a; font-weight:700; text-decoration:none; border-radius:3px; box-shadow:0 0 18px rgba(56,224,255,0.45); clip-path:polygon(10px 0,100% 0,100% calc(100% - 10px),calc(100% - 10px) 100%,0 100%,0 10px); transition:transform .25s, box-shadow .25s; }
    .btn:hover { transform:translateY(-2px); box-shadow:0 0 34px rgba(56,224,255,0.6); }
    .meta { margin-top:26px; font-family:"JetBrains Mono",monospace; font-size:10px; letter-spacing:0.2em; color:#5b7e93; }
    .meta i { display:inline-block; width:8px; height:8px; border-radius:50%; background:#ff5a6e; box-shadow:0 0 10px #ff5a6e; margin-right:8px; animation:blink 1.4s infinite; vertical-align:middle; }
    @keyframes blink { 0%,100%{opacity:1;} 50%{opacity:.25;} }
  </style>
</head>
<body>
  <div class="box">
    <svg class="hex" viewBox="0 0 100 100" aria-hidden="true">
      <polygon points="50,4 92,27 92,73 50,96 8,73 8,27" fill="none" stroke="#38e0ff" stroke-width="1.5" opacity="0.7"/>
      <polygon points="50,18 80,34 80,66 50,82 20,66 20,34" fill="none" stroke="#ffc46b" stroke-width="1" opacity="0.5"/>
      <circle cx="50" cy="50" r="6" fill="#38e0ff"/>
    </svg>
    <div class="code"><span class="glitch">404</span></div>
    <h1>Signal Lost</h1>
    <p>The coordinates you requested don't exist in this sector.<br>Re-establishing uplink to <b>ARC OS</b> is recommended.</p>
    <a class="btn" href="/">&#9672; Return to Base</a>
    <div class="meta"><i></i>ERR_SECTOR_NOT_FOUND &middot; ARC OS v2.0</div>
  </div>
</body>
</html>
